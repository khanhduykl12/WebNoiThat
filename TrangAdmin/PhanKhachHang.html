<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý khách hàng</title>
    <link rel="stylesheet" href="../CSS/all.min.css">
    <link rel="stylesheet" href="../CSS/bootstrap.min.css">
    <link rel="stylesheet" href="CssTrangAdmin.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <script src="../JS/all.min.js"></script>
    <script src="../JS/bootstrap.bundle.min.js"></script>
    <style>
        .loading-cell { text-align: center; padding: 40px; }
        .spinner {
            display: inline-block; width: 30px; height: 30px;
            border: 3px solid #f3f3f3; border-top: 3px solid #28a745;
            border-radius: 50%; animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .avatar-circle {
            width: 40px; height: 40px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; color: white; font-size: 14px;
            flex-shrink: 0;
        }
        .status-active { background-color: #d4edda; color: #155724; padding: 4px 10px; border-radius: 15px; font-size: 11px; font-weight: 600; }
        .status-inactive { background-color: #f8d7da; color: #721c24; padding: 4px 10px; border-radius: 15px; font-size: 11px; font-weight: 600; }
        .customer-thumb {
            width: 40px; height: 40px; border-radius: 50%; object-fit: cover;
            border: 2px solid #dee2e6;
        }
    </style>
</head>
<body>

<!-- FILTER BAR -->
<div class="filter-bar">
    <form id="filterForm" class="d-flex justify-content-between align-items-center flex-wrap gap-3">
        <div class="flex-grow-1 search-bar d-flex align-items-center gap-2">
            <i class="bi bi-search text-secondary"></i>
            <input type="text" id="searchInput" value="" placeholder="Tìm kiếm tên, email, SĐT..." class="form-control search-input" />
        </div>
        <select id="statusFilter" class="form-select filter-select">
            <option value="">Tất cả</option>
            <option value="active">Hoạt động</option>
            <option value="inactive">Bị khóa</option>
        </select>
        <button type="button" id="btnFilter" class="btn btn-success fw-bold">
            <i class="bi bi-search"></i> Tìm
        </button>
        <button type="button" id="btnReset" class="btn btn-secondary fw-bold">
            <i class="bi bi-arrow-counterclockwise"></i> Đặt lại
        </button>
    </form>
</div>

<!-- TABLE -->
<div class="table-container">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h4 class="fw-bold m-0"><i class="bi bi-people-fill"></i> Quản lý khách hàng</h4>
        <span id="totalCount" class="badge bg-primary"></span>
    </div>

    <table class="table table-bordered table-striped align-middle text-center">
        <thead class="table-dark">
            <tr>
                <th>Khách hàng</th>
                <th>Email</th>
                <th>SĐT</th>
                <th>Giới tính</th>
                <th>Ngày sinh</th>
                <th>Ngày tham gia</th>
                <th>Trạng thái</th>
                <th>Hành động</th>
            </tr>
        </thead>
        <tbody id="customersTableBody">
            <tr><td colspan="8" class="loading-cell"><div class="spinner"></div><p class="mt-2 text-muted">Đang tải dữ liệu...</p></td></tr>
        </tbody>
    </table>

    <div id="paginationContainer" class="d-flex justify-content-center mt-3"></div>
</div>

<!-- Detail Modal -->
<div id="customerModal" class="modal fade" tabindex="-1">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title"><i class="bi bi-person-circle"></i> Chi tiết khách hàng</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body" id="customerModalBody">
                <div class="text-center"><div class="spinner"></div></div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Đóng</button>
                <button type="button" class="btn btn-primary" id="btnSaveCustomer">
                    <i class="bi bi-save"></i> Lưu thay đổi
                </button>
            </div>
        </div>
    </div>
</div>

<script>
(function() {
    var API_BASE = 'http://localhost:5000/api';
    var currentPage = 1;
    var selectedCustomerId = null;

    function getAuthHeaders() {
        return {
            'Authorization': 'Bearer ' + (localStorage.getItem('access_token') || ''),
            'Content-Type': 'application/json'
        };
    }

    function formatDate(dateStr) {
        if (!dateStr) return '--';
        var d = new Date(dateStr);
        return d.toLocaleDateString('vi-VN', { day: '2-digit', month: '2-digit', year: 'numeric' });
    }

    function getAvatarColor(name) {
        var colors = ['#0d6efd', '#6f42c1', '#e83e8c', '#fd7e14', '#28a745', '#20c997', '#17a2b8', '#dc3545'];
        if (!name) return colors[0];
        var idx = name.charCodeAt(0) % colors.length;
        return colors[idx];
    }

    function getInitials(name) {
        if (!name) return '?';
        var parts = name.trim().split(' ');
        if (parts.length >= 2) {
            return (parts[0][0] + parts[parts.length - 1][0]).toUpperCase();
        }
        return name.substring(0, 2).toUpperCase();
    }

    function renderCustomers(customers, total) {
        var tbody = document.getElementById('customersTableBody');
        var countEl = document.getElementById('totalCount');

        if (countEl) countEl.textContent = 'Tổng: ' + (total || 0) + ' khách hàng';

        if (!customers || customers.length === 0) {
            tbody.innerHTML = '<tr><td colspan="8" class="text-center text-muted py-4"><i class="bi bi-people" style="font-size:2rem"></i><p class="mt-2">Không có khách hàng nào</p></td></tr>';
            return;
        }

        var html = '';
        customers.forEach(function(c) {
            var avatar = c.HinhDaiDien
                ? '<img src="' + c.HinhDaiDien + '" class="customer-thumb" onerror="this.style.display=\'none\'; this.nextElementSibling.style.display=\'flex\'">'
                + '<div class="avatar-circle" style="display:none; background:' + getAvatarColor(c.HoTen) + '">' + getInitials(c.HoTen) + '</div>'
                : '<div class="avatar-circle" style="background:' + getAvatarColor(c.HoTen) + '">' + getInitials(c.HoTen) + '</div>';

            var status = c.TrangThai === 'active'
                ? '<span class="status-active"><i class="bi bi-check-circle"></i> Hoạt động</span>'
                : '<span class="status-inactive"><i class="bi bi-x-circle"></i> Bị khóa</span>';

            html += '<tr>' +
                '<td class="text-start"><div class="d-flex align-items-center gap-2">' + avatar +
                '<div><strong>' + (c.HoTen || '--') + '</strong><br><small class="text-muted">@' + (c.TenDangNhap || '') + '</small></div></div></td>' +
                '<td>' + (c.Email || '--') + '</td>' +
                '<td>' + (c.SoDienThoai || '--') + '</td>' +
                '<td>' + (c.GioiTinh || '--') + '</td>' +
                '<td>' + (c.NgaySinh ? formatDate(c.NgaySinh) : '--') + '</td>' +
                '<td>' + (c.NgayTao ? formatDate(c.NgayTao) : '--') + '</td>' +
                '<td>' + status + '</td>' +
                '<td>' +
                '<button class="btn btn-sm btn-info me-1 mb-1" onclick="viewCustomer(' + c.MaND + ')"><i class="bi bi-eye"></i></button>' +
                '</td></tr>';
        });
        tbody.innerHTML = html;
    }

    function showLoading() {
        document.getElementById('customersTableBody').innerHTML =
            '<tr><td colspan="8" class="loading-cell"><div class="spinner"></div><p class="mt-2 text-muted">Đang tải...</p></td></tr>';
    }

    function loadCustomers(page) {
        if (page === undefined) page = 1;
        currentPage = page;
        showLoading();

        var search = document.getElementById('searchInput').value;
        var status = document.getElementById('statusFilter').value;

        var params = ['page=' + page];
        if (search) params.push('search=' + encodeURIComponent(search));
        if (status) params.push('trang_thai=' + status);

        var url = API_BASE + '/admin/customers/?' + params.join('&');

        fetch(url, { method: 'GET', headers: getAuthHeaders() })
            .then(function(r) { return r.json(); })
            .then(function(res) {
                var customers = Array.isArray(res) ? res : (res.data || []);
                renderCustomers(customers, res.total || customers.length);
                renderPagination(res);
            })
            .catch(function(e) {
                console.error('Load customers error:', e);
                document.getElementById('customersTableBody').innerHTML =
                    '<tr><td colspan="8" class="text-center text-danger py-4"><i class="bi bi-exclamation-triangle" style="font-size:2rem"></i><p class="mt-2">Không thể tải dữ liệu</p></td></tr>';
            });
    }

    function renderPagination(res) {
        var container = document.getElementById('paginationContainer');
        var total = res.total || 0;
        var pages = res.pages || 1;
        if (pages <= 1) { container.innerHTML = ''; return; }
        var html = '<ul class="pagination">';
        html += '<li class="page-item ' + (currentPage <= 1 ? 'disabled' : '') + '"><a class="page-link" href="#" onclick="loadCustomers(' + (currentPage - 1) + ');return false;">&laquo; Trước</a></li>';
        for (var i = 1; i <= pages; i++) {
            html += '<li class="page-item ' + (i === currentPage ? 'active' : '') + '"><a class="page-link" href="#" onclick="loadCustomers(' + i + ');return false;">' + i + '</a></li>';
        }
        html += '<li class="page-item ' + (currentPage >= pages ? 'disabled' : '') + '"><a class="page-link" href="#" onclick="loadCustomers(' + (currentPage + 1) + ');return false;">Sau &raquo;</a></li>';
        html += '</ul>';
        container.innerHTML = html;
    }

    window.viewCustomer = function(customerId) {
        selectedCustomerId = customerId;
        var modal = new bootstrap.Modal(document.getElementById('customerModal'));
        document.getElementById('customerModalBody').innerHTML = '<div class="text-center py-5"><div class="spinner"></div></div>';
        modal.show();

        fetch(API_BASE + '/admin/customers/' + customerId, { method: 'GET', headers: getAuthHeaders() })
            .then(function(r) { return r.json(); })
            .then(function(c) {
                if (Array.isArray(c)) c = c[0];
                var data = c.data || c;
                var avatar = data.HinhDaiDien
                    ? '<img src="' + data.HinhDaiDien + '" style="width:80px;height:80px;border-radius:50%;object-fit:cover;border:3px solid #dee2e6;">'
                    : '<div class="avatar-circle" style="width:80px;height:80px;font-size:28px;background:' + getAvatarColor(data.HoTen) + '">' + getInitials(data.HoTen) + '</div>';

                document.getElementById('customerModalBody').innerHTML = '<div class="row">' +
                    '<div class="col-md-4 text-center mb-3">' +
                    avatar + '<h6 class="mt-2 fw-bold">' + (data.HoTen || '--') + '</h6>' +
                    '<small class="text-muted">@' + (data.TenDangNhap || '') + '</small></div>' +
                    '<div class="col-md-8"><div class="row g-2">' +
                    '<div class="col-6"><label class="form-label small text-muted">Email</label><input type="email" class="form-control" id="editEmail" value="' + (data.Email || '') + '" readonly></div>' +
                    '<div class="col-6"><label class="form-label small text-muted">SĐT</label><input type="text" class="form-control" id="editPhone" value="' + (data.SoDienThoai || '') + '"></div>' +
                    '<div class="col-6"><label class="form-label small text-muted">Giới tính</label><select class="form-select" id="editGender"><option value="Nam"' + (data.GioiTinh === 'Nam' ? ' selected' : '') + '>Nam</option><option value="Nữ"' + (data.GioiTinh === 'Nữ' ? ' selected' : '') + '>Nữ</option><option value="Khác"' + (data.GioiTinh === 'Khác' ? ' selected' : '') + '>Khác</option></select></div>' +
                    '<div class="col-6"><label class="form-label small text-muted">Ngày sinh</label><input type="date" class="form-control" id="editDob" value="' + (data.NgaySinh || '') + '"></div>' +
                    '<div class="col-6"><label class="form-label small text-muted">Trạng thái</label><select class="form-select" id="editStatus"><option value="active"' + (data.TrangThai === 'active' ? ' selected' : '') + '>Hoạt động</option><option value="inactive"' + (data.TrangThai === 'inactive' ? ' selected' : '') + '>Bị khóa</option></select></div>' +
                    '<div class="col-6"><label class="form-label small text-muted">Địa chỉ</label><input type="text" class="form-control" id="editAddress" value="' + (data.DiaChi || '') + '"></div>' +
                    '<div class="col-12"><label class="form-label small text-muted">Ghi chú</label><textarea class="form-control" id="editNote" rows="2" placeholder="Ghi chú về khách hàng..."></textarea></div>' +
                    '</div></div></div>';
            })
            .catch(function(e) {
                document.getElementById('customerModalBody').innerHTML =
                    '<div class="text-center text-danger py-5"><i class="bi bi-exclamation-triangle" style="font-size:2rem"></i><p>Lỗi tải dữ liệu</p></div>';
            });
    };

    document.getElementById('btnSaveCustomer').addEventListener('click', function() {
        if (!selectedCustomerId) return;
        var payload = {
            TrangThai: document.getElementById('editStatus').value,
            GioiTinh: document.getElementById('editGender').value,
            DiaChi: document.getElementById('editAddress').value
        };
        fetch(API_BASE + '/admin/customers/' + selectedCustomerId, {
            method: 'PUT',
            headers: getAuthHeaders(),
            body: JSON.stringify(payload)
        })
        .then(function(r) { return r.json(); })
        .then(function(res) {
            if (res.success) {
                bootstrap.Modal.getInstance(document.getElementById('customerModal')).hide();
                loadCustomers(currentPage);
            } else {
                alert(res.message || 'Lưu thất bại!');
            }
        })
        .catch(function(e) { alert('Lỗi kết nối!'); });
    });

    document.getElementById('btnFilter').addEventListener('click', function() { loadCustomers(1); });
    document.getElementById('btnReset').addEventListener('click', function() {
        document.getElementById('searchInput').value = '';
        document.getElementById('statusFilter').value = '';
        loadCustomers(1);
    });
    document.getElementById('searchInput').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') { e.preventDefault(); loadCustomers(1); }
    });

    document.addEventListener('DOMContentLoaded', function() { loadCustomers(1); });
})();
</script>
</body>
</html>
