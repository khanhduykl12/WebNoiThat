<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Thêm Sản Phẩm</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: #f4f5f7;
        padding: 20px;
    }
    .container {
        max-width: 1000px;
        margin: 0 auto;
        background: #fff;
        padding: 25px;
        border-radius: 12px;
        box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    h2 {
        margin-bottom: 20px;
    }
    label {
        font-weight: bold;
        display: block;
        margin-top: 10px;
    }
    input, select, textarea {
        width: 100%;
        padding: 10px;
        margin-top: 5px;
        border-radius: 6px;
        border: 1px solid #ccc;
    }
    .row {
        display: flex;
        gap: 20px;
    }
    .col-6 {
        width: 50%;
    }
    .box {
        margin-top: 20px;
        padding: 15px;
        border: 1px solid #ddd;
        border-radius: 8px;
        background: #fafafa;
    }
    .checkbox-item {
        display: block;
        margin-top: 5px;
    }
    button {
        margin-top: 20px;
        padding: 12px 20px;
        border: none;
        background: #007bff;
        color: #fff;
        font-size: 16px;
        border-radius: 8px;
        cursor: pointer;
    }
</style>
</head>
<body>

<div class="container">
    <h2>Thêm Sản Phẩm</h2>

    <div class="row">
        <div class="col-6">
            <label>Tên sản phẩm</label>
            <input type="text">

            <label>Giá bán</label>
            <input type="number">

            <label>Giá khuyến mãi</label>
            <input type="number">

            <label>Giảm giá (%)</label>
            <input type="number">

            <label>Thương hiệu</label>
            <select id="thuongHieu"></select>

            <label>Trạng thái</label>
            <select>
                <option>Còn hàng</option>
                <option>Hết hàng</option>
            </select>
        </div>

        <div class="col-6">
            <label>Ảnh sản phẩm</label>
            <input type="file">

            <label>Số lượng tồn</label>
            <input type="number">

            <label>Mô tả 1</label>
            <input type="text">

            <label>Mô tả 2</label>
            <input type="text">

            <label>Mô tả 3</label>
            <input type="text">

            <label>Mô tả 4</label>
            <input type="text">
        </div>
    </div>

    <div class="box">
        <h3>Danh Mục – Chi Tiết – Loại Sản Phẩm</h3>

        <label>Danh Mục Chính</label>
        <select id="danhMuc"></select>

        <label>Chi Tiết Danh Mục</label>
        <select id="chiTietDM"></select>

        <label>Loại Sản Phẩm</label>
        <select id="loaiSP"></select>
    </div>

    <div class="box">
        <h3>Chọn Lọc Sản Phẩm</h3>
        <div id="chonLocContainer"></div>
    </div>

    <button>Thêm Sản Phẩm</button>
</div>

// =========================
// Render dữ liệu vào form
// =========================

function loadThuongHieu() {
    const select = document.getElementById("thuongHieu");
    thuongHieuData.forEach(x => {
        select.innerHTML += `<option value="${x.id}">${x.name}</option>`;
    });
}

function loadDanhMuc() {
    const select = document.getElementById("danhMuc");
    danhMucData.forEach(x => {
        select.innerHTML += `<option value="${x.id}">${x.name}</option>`;
    });
}

function loadChiTietDM(madm) {
    const select = document.getElementById("chiTietDM");
    select.innerHTML = "";

    chiTietDanhMucData
        .filter(x => x.madm == madm)
        .forEach(x => {
            select.innerHTML += `<option value="${x.id}">${x.name}</option>`;
        });

    loadLoaiSP();
}

function loadLoaiSP() {
    const madm = document.getElementById("danhMuc").value;
    const ctdm = document.getElementById("chiTietDM").value;
    const select = document.getElementById("loaiSP");

    select.innerHTML = "";

    loaiSanPhamData
        .filter(x => x.madm == madm && x.ctdm == ctdm)
        .forEach(x => {
            select.innerHTML += `<option value="${x.id}">${x.name}</option>`;
        });
}

function loadChonLoc() {
    const box = document.getElementById("chonLocContainer");

    chonLocData.forEach(cl => {
        box.innerHTML += `
            <div class="chonloc-group">
                <h4>${cl.name}</h4>
                ${chiTietChonLocData
                    .filter(x => x.cl == cl.id)
                    .map(x => `
                        <label class="checkbox-item">
                            <input type="checkbox" value="${x.id}"> ${x.name}
                        </label>
                    `).join("")}
                <hr>
            </div>
        `;
    });
}

document.getElementById("danhMuc").addEventListener("change", (e) => {
    loadChiTietDM(e.target.value);
});

document.getElementById("chiTietDM").addEventListener("change", () => {
    loadLoaiSP();
});

// KHỞI TẠO TẤT CẢ
// ===========================

</html>
