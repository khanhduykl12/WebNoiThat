<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Thêm Sản Phẩm</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: #f4f5f7;
        padding: 20px;
    }
    .container {
        max-width: 1000px;
        margin: 0 auto;
        background: #fff;
        padding: 25px;
        border-radius: 12px;
        box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    h2 {
        margin-bottom: 20px;
    }
    label {
        font-weight: bold;
        display: block;
        margin-top: 10px;
    }
    input, select, textarea {
        width: 100%;
        padding: 10px;
        margin-top: 5px;
        border-radius: 6px;
        border: 1px solid #ccc;
    }
    .row {
        display: flex;
        gap: 20px;
    }
    .col-6 {
        width: 50%;
    }
    .box {
        margin-top: 20px;
        padding: 15px;
        border: 1px solid #ddd;
        border-radius: 8px;
        background: #fafafa;
    }
    .checkbox-item {
        display: block;
        margin-top: 5px;
    }
    .checkbox-group label {
        display: block;
        margin: 4px 0;
    }
    button {
        margin-top: 20px;
        padding: 12px 20px;
        border: none;
        background: #007bff;
        color: #fff;
        font-size: 16px;
        border-radius: 8px;
        cursor: pointer;
    }
</style>
</head>
<body>

<div class="container">
    <h2>Thêm Sản Phẩm</h2>

    <div class="row">
        <div class="col-6">
            <label>Tên sản phẩm</label>
            <input type="text">

            <label>Giá bán</label>
            <input type="number">

            <label>Giá khuyến mãi</label>
            <input type="number">

            <label>Giảm giá (%)</label>
            <input type="number">

            <label>Thương hiệu</label>
            <select id="thuongHieu"></select>

            <label>Trạng thái</label>
            <select>
                <option>Còn hàng</option>
                <option>Hết hàng</option>
            </select>
        </div>

        <div class="col-6">
            <label>Ảnh sản phẩm</label>
            <input type="file">

            <label>Số lượng tồn</label>
            <input type="number">

            <label>Mô tả 1</label>
            <input type="text">

            <label>Mô tả 2</label>
            <input type="text">

            <label>Mô tả 3</label>
            <input type="text">

            <label>Mô tả 4</label>
            <input type="text">
        </div>
    </div>

    <div class="box">
        <!-- ====================== DANH MỤC ====================== -->
        <h2>Danh Mục</h2>
        <select id="danhmuc_select">
            <option value="">-- Chọn Danh Mục --</option>
        </select>

        <!-- Chi tiết danh mục -->
        <div id="ctdm_container" style="display:none; margin-top:15px;">
            <h3>Chi Tiết Danh Mục</h3>
            <div id="ctdm_list"></div>
        </div>

        <!-- Loại sản phẩm -->
        <div id="loaisp_container" style="display:none; margin-top:15px;">
            <h3>Loại Sản Phẩm</h3>
            <div id="loaisp_list"></div>
        </div>

        <!-- ====================== CHỌN LỌC SẢN PHẨM ====================== -->
        <h2 style="margin-top:25px;">Chọn Lọc Sản Phẩm</h2>
        <div id="chonloc_container"></div>
    </div>

    <button>Thêm Sản Phẩm</button>
</div>

<script>
// ======================
//  DỮ LIỆU DATABASE
// ======================

// THƯƠNG HIỆU
const thuongHieuData = [
{ id:1,name:"Hector" },{ id:2,name:"JsXiong" },{ id:3,name:"Max Bike" },{ id:4,name:"Raccoon" },
{ id:5,name:"Fascino" },{ id:6,name:"Giant" },{ id:7,name:"DTFLY" },{ id:8,name:"Qitong" },
{ id:9,name:"Thống Nhất" },{ id:10,name:"Shukyo" },{ id:11,name:"Papylus" },
{ id:12,name:"QT BIKE" },{ id:13,name:"Fornix" },{ id:14,name:"Nesto" },{ id:15,name:"Trinx Bike" }
];

const DanhMuc = [

    { id:3, name:"Xe đạp địa hình" },
    { id:4, name:"Xe đạp touring" },
    { id:5, name:"Xe đạp đua" }
];

const ChiTietDanhMuc = [
    { id:1, madm:1, name:"ĐỘ TUỔI" },

    { id:4, madm:2, name:"PHÂN KHÚC GIÁ" },
    { id:5, madm:3, name:"THƯƠNG HIỆU" },
    { id:6, madm:3, name:"CẤU HÌNH" },

    { id:8, madm:4, name:"MỨC GIÁ TOURING" },

    { id:11, madm:5, name:"THƯƠNG HIỆU ĐUA" },

const LoaiSanPham = [

    { id:7, madm:1, ctdm:2, name:"Size 18 inch" },
    { id:8, madm:1, ctdm:2, name:"Size 20 inch" },

    { id:9, madm:2, ctdm:3, name:"Size 24 inch" },
    { id:10, madm:2, ctdm:3, name:"Size 26 inch" },
    { id:11, madm:2, ctdm:3, name:"Size 27.5 inch" },
    { id:12, madm:2, ctdm:4, name:"Xe Đạp Dưới 3 Triệu" },
    { id:13, madm:2, ctdm:4, name:"Xe Đạp Từ 3-5 Triệu" },
    { id:14, madm:2, ctdm:4, name:"Xe Đạp Từ 5-7 Triệu" },
    { id:15, madm:2, ctdm:4, name:"Xe Đạp Từ 7-10 Triệu" },

    { id:18, madm:3, ctdm:5, name:"Xe Đạp Hector" },

    { id:24, madm:3, ctdm:7, name:"Xe đạp dưới 3 triệu" },
    { id:25, madm:3, ctdm:7, name:"Xe đạp từ 3-5 triệu" },

    { id:29, madm:3, ctdm:7, name:"Xe đạp từ 15 triệu" },

    { id:30, madm:4, ctdm:8, name:"Xe Đạp Touring Từ 3-10 Triệu" },
    { id:31, madm:4, ctdm:8, name:"Xe Đạp Touring Từ 10-15 Triệu" },
    { id:32, madm:4, ctdm:8, name:"Xe Đạp Touring Từ 15-20 Triệu" },
    { id:33, madm:4, ctdm:9, name:"Xe Đạp Touring Giant" },
    { id:34, madm:4, ctdm:9, name:"Xe Đạp Touring Thống Nhất" },
    { id:35, madm:4, ctdm:9, name:"Xe Đạp Touring DtFly" },
    { id:36, madm:4, ctdm:9, name:"Xe Đạp Touring Fascino" },

    { id:38, madm:5, ctdm:10, name:"Xe Đạp Đua Từ 3-7 Triệu" },
    { id:39, madm:5, ctdm:10, name:"Xe Đạp Đua Từ 7-12 Triệu" },
    { id:40, madm:5, ctdm:10, name:"Xe Đạp Đua Từ 12-18 Triệu" },
    { id:41, madm:5, ctdm:10, name:"Xe Đạp Đua Từ 18-25 Triệu" },
    { id:42, madm:5, ctdm:11, name:"Xe Đạp Đua Nesto" },
    { id:43, madm:5, ctdm:11, name:"Xe Đạp Đua Papylus" },
    { id:44, madm:5, ctdm:11, name:"Xe Đạp Đua DtFly" },
    { id:45, madm:5, ctdm:11, name:"Xe Đạp Đua Fascino" },
];

// ====================== CHỌN LỌC ======================
const ChonLoc = [
    { id:1, name:"Lọc Theo Giá" },
    { id:2, name:"Danh Mục" },
    { id:3, name:"Chiều cao phù hợp" },
    { id:4, name:"Kích Thước Bánh Xe" }
];

const CTChonLoc = [
    { id:1, group:1, name:"Dưới 3 Triệu" },
    { id:2, group:1, name:"Từ 3-6 Triệu" },
    { id:3, group:1, name:"Từ 6-10 Triệu" },
    { id:4, group:1, name:"Từ 10-20 Triệu" },

    { id:5, group:2, name:"Xe Đạp Địa Hình" },
    { id:6, group:2, name:"Xe Đạp Đua" },
    { id:7, group:2, name:"Xe Đạp Trẻ Em" },
    { id:8, group:2, name:"Xe Đạp Thể Thao" },
    { id:9, group:2, name:"Xe Đạp Touring" },

    { id:10, group:3, name:"1m30" },
    { id:11, group:3, name:"1m60 Trở Lên" },
    { id:12, group:3, name:"1m40 Trở Lên" },
    { id:13, group:3, name:"Từ 1m45-1m55" },
    { id:14, group:3, name:"Trên 1m55" },

    { id:15, group:4, name:"12 Inch" },
    { id:16, group:4, name:"14 Inch" },
    { id:17, group:4, name:"16 Inch" },
    { id:18, group:4, name:"18 Inch" },
    { id:19, group:4, name:"20 Inch" },
    { id:20, group:4, name:"22 Inch" },
    { id:21, group:4, name:"24 Inch" },
    { id:22, group:4, name:"26 Inch" },
    { id:23, group:4, name:"27.5 Inch" },
    { id:24, group:4, name:"29 Inch" },
    { id:25, group:4, name:"700C" },
];

// ====================== LOAD THƯƠNG HIỆU ======================
const thuongHieuSelect = document.getElementById("thuongHieu");
thuongHieuData.forEach(t => {
    thuongHieuSelect.innerHTML += `<option value="${t.id}">${t.name}</option>`;
});

// ====================== LOAD DANH MỤC ======================
const dmSel = document.getElementById("danhmuc_select");

DanhMuc.forEach(dm => {
    dmSel.innerHTML += `<option value="${dm.id}">${dm.name}</option>`;
});

dmSel.addEventListener("change", () => {
    const id = Number(dmSel.value);

    if (!id) {
        document.getElementById("ctdm_container").style.display = "none";
        document.getElementById("loaisp_container").style.display = "none";
        return;
    }

    const list = ChiTietDanhMuc.filter(c => c.madm === id);

    let html = "";
    list.forEach(c => {
        html += `
            <label class="checkbox-item">
                <input type="checkbox" class="ctdm_check" value="${c.id}">
                ${c.name}
            </label>
        `;
    });

    document.getElementById("ctdm_list").innerHTML = html;
    document.getElementById("ctdm_container").style.display = "block";
    document.getElementById("loaisp_container").style.display = "none";

    document.querySelectorAll(".ctdm_check").forEach(cb => {
        cb.addEventListener("change", loadLoaiSP);
    });
});

// ====================== LOAD LOẠI SẢN PHẨM ======================
function loadLoaiSP() {
    const checked = [...document.querySelectorAll(".ctdm_check:checked")]
        .map(x => Number(x.value));

    if (checked.length === 0) {
        document.getElementById("loaisp_container").style.display = "none";
        return;
    }

    let html = "";

    checked.forEach(ctdm_id => {
        const ctdmName = ChiTietDanhMuc.find(x => x.id === ctdm_id).name;

        html += `<h4>${ctdmName}</h4><div class="checkbox-group">`;

        LoaiSanPham.filter(sp => sp.ctdm === ctdm_id)
        .forEach(sp => {
            html += `<label><input type="checkbox" value="${sp.id}"> ${sp.name}</label>`;
        });

        html += "</div>";
    });

    document.getElementById("loaisp_list").innerHTML = html;
    document.getElementById("loaisp_container").style.display = "block";
}

// ====================== LOAD CHỌN LỌC ======================
let chonloc_html = "";

ChonLoc.forEach(group => {
    chonloc_html += `<div class="block"><h3>${group.name}</h3><div class="checkbox-group">`;

    CTChonLoc.filter(c => c.group === group.id)
        .forEach(opt => {
            chonloc_html += `<label><input type="checkbox" value="${opt.id}"> ${opt.name}</label>`;
        });

    chonloc_html += `</div></div>`;
});

document.getElementById("chonloc_container").innerHTML = chonloc_html;

</script>

</body>
</html>
